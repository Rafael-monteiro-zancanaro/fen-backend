# Database connection settings
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.drop-first=true
spring.liquibase.clear-checksums=true

# Configurar o Hibernate Envers para usar o schema AUD
spring.jpa.properties.org.hibernate.envers.default_schema=aud
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.org.hibernate.envers.revision_field_name=rev
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revtype

# Forçar o Hibernate a usar o schema correto
spring.jpa.properties.hibernate.default_schema=public

# Desabilitar completamente a criação/validação do schema pelo Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.generate-ddl=false

# Desabilitar validação do schema do Envers
spring.jpa.properties.org.hibernate.envers.do_not_audit_optimistic_locking_field=true

# Desabilitar validação do schema JPA
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=none
spring.jpa.properties.jakarta.persistence.schema-generation.create-source=metadata
spring.jpa.properties.jakarta.persistence.schema-generation.drop-source=metadata

# Desabilitar validação do Hibernate
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Garantir ordem de inicialização
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Logging
logging.level.liquibase=DEBUG
logging.level.liquibase.changelog=TRACE
logging.level.org.springframework.boot.liquibase=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG