databaseChangeLog:
  - changeSet:
      id: 'create_table_farmaceutico'
      author: 'rafael.zancanaro'
      comment: 'Adiciona a tabela farmaceutico ao projeto'
      preConditions:
        - onFail: WARN
        - not:
            - tableExists:
                tableName: farmaceutico
      changes:
        - createTable:
            tableName: farmaceutico
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: crf
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: responsaveltecnico
                  type: boolean
              - column:
                  name: createdat
                  type: timestamp
              - column:
                  name: lastupdatedat
                  type: timestamp
              - column:
                  name: createdby
                  type: varchar(255)
              - column:
                  name: lastupdatedby
                  type: varchar(255)

  - changeSet:
      id: 'create_table_farmaceutico_aud'
      author: 'rafael.zancanaro'
      comment: 'Adiciona a tabela de auditoria farmaceutico_aud no schema aud'
      preConditions:
        - onFail: WARN
        - not:
            - tableExists:
                schemaName: aud
                tableName: farmaceutico_aud
      changes:
        - createTable:
            tableName: farmaceutico_aud
            schemaName: aud
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: rev
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: revtype
                  type: tinyint
                  constraints:
                    nullable: false
              - column:
                  name: crf
                  type: varchar(255)
              - column:
                  name: responsaveltecnico
                  type: boolean
              - column:
                  name: createdat
                  type: timestamp
              - column:
                  name: lastupdatedat
                  type: timestamp
              - column:
                  name: createdby
                  type: varchar(255)
              - column:
                  name: lastupdatedby
                  type: varchar(255)
        - addPrimaryKey:
            tableName: farmaceutico_aud
            schemaName: aud
            columnNames: rev, id
            constraintName: pk_farmaceutico_aud